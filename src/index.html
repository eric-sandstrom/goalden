<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Goalden</title>
  <base href="/">
  <!-- interactive-widget=resizes-content: when the soft keyboard opens, shrink
       the layout viewport (and the fixed app shell / bottom-sheet overlay) to
       the area above it, instead of letting the keyboard overlay fixed content.
       Keeps focused inputs — e.g. in the create-league bottom sheet — visible.
       (Android Chrome; iOS Safari ignores it and handles the keyboard itself.) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="FIFA World Cup 2026 predictions, leaderboards, and friend leagues">
  <meta name="theme-color" content="#0F7B3A" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a4d24" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Goalden">
  <!-- SVG favicon (the Goalden logo) for modern browsers; .ico fallback (also
       generated from the logo) for legacy browsers and the implicit /favicon.ico
       request. Regenerate both via `npm run icons:generate`. -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <!-- Material Symbols (Rounded). FILL is loaded as a 0..1 range — not pinned —
       so the axis can be animated (e.g. the bottom-nav active-item fill). -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&amp;display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
