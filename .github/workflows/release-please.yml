# Automated release management via release-please.
#
# How it works:
#   1. On every push to main, release-please scans the conventional-commit
#      history since the last release tag and maintains a standing "release PR"
#      that bumps package.json + regenerates CHANGELOG.md from those commits.
#        - feat:            -> minor bump   (1.0.0 -> 1.1.0)
#        - fix: / perf:     -> patch bump   (1.0.0 -> 1.0.1)
#        - feat!: / "BREAKING CHANGE:" footer -> major bump (1.0.0 -> 2.0.0)
#      Commits whose type isn't release-worthy (chore/docs/ci/...) don't open a
#      release PR on their own, but ride along in the next one.
#   2. You review the release PR; merging it lands the version bump + changelog
#      on main and creates the GitHub release + git tag (e.g. v1.1.0).
#   3. When the release PR merges, release-please reports releases_created=true
#      and this workflow's `deploy` job calls deploy.yml. Its `npm run build`
#      fires the `prebuild` hook (sync-changelog.mjs), which parses the freshly
#      merged CHANGELOG.md into ngsw-config.json's appData — so the deployed
#      build surfaces the accumulated changes in the in-app "What's new" dialog.
#      Ordinary (non-release) merges to main no longer deploy.
#
# Source of truth: PR titles. Because PRs are squash-merged, the squash commit
# subject is the PR title — so PR titles MUST be conventional commits
# (`feat: ...`, `fix: ...`). A non-conventional title is silently ignored and
# its change won't appear in the changelog.
#
# Repo setting required (one-time): Settings -> Actions -> General ->
# "Workflow permissions" -> tick "Allow GitHub Actions to create and approve
# pull requests". Without it, release-please can't open the release PR using the
# default GITHUB_TOKEN.
#
# Required secret (one-time): RELEASE_PLEASE_TOKEN — a fine-grained PAT (or
# GitHub App token) with this repo's Contents: R/W + Pull requests: R/W. The
# release PR is authored with it INSTEAD of GITHUB_TOKEN so that opening the PR
# triggers the required status checks (ci.yml / pr-title-lint.yml). GitHub does
# not start workflows for events caused by GITHUB_TOKEN (anti-recursion), so a
# GITHUB_TOKEN-authored release PR sits forever BLOCKED on "Build Angular app" /
# "Validate conventional title" never reporting. Until the secret is set the
# token below falls back to GITHUB_TOKEN (the old, blocked-but-functional
# behaviour), so merging this change is safe on its own.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't race with itself if two merges land close together.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      # 'true' (string) only on the run where a release PR was merged.
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Author the release PR with a PAT (not the default GITHUB_TOKEN) so
          # opening it triggers the required checks — see the header note. Falls
          # back to GITHUB_TOKEN when the secret isn't configured.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # Defaults to release-please-config.json + .release-please-manifest.json
          # at the repo root.

  # Deploy only when a release was actually cut. We call deploy.yml as a
  # reusable workflow (rather than triggering it off the release tag) because
  # tags pushed by the default GITHUB_TOKEN don't start other workflows.
  # `secrets: inherit` hands deploy.yml the Firebase service-account secret.
  deploy:
    name: Deploy release
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
