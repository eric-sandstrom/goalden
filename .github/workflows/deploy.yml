# Auto-deploy to Firebase on push to main.
#
# Deploys: Hosting (Angular app) + Cloud Functions + Firestore rules + indexes.
#
# Authentication uses a Google Cloud service account. firebase-tools v15+
# dropped support for the old FIREBASE_TOKEN env var, so we now pass a
# service account JSON via google-github-actions/auth which writes it to a
# tempfile and exports GOOGLE_APPLICATION_CREDENTIALS — firebase-tools then
# picks it up automatically.
#
# Required GitHub secret:
#   FIREBASE_SERVICE_ACCOUNT_GOALDEN_693DC
#       The full JSON contents of a service account key with the
#       `Firebase Admin` role on the goalden-693dc project. This is the
#       secret name auto-generated by `firebase init hosting:github`; we
#       reuse it so there's only one set of CI credentials to rotate.
#
# Required Firebase Functions secret (set once locally, separate from GitHub):
#   FOOTBALL_DATA_TOKEN        Used by the deployed pollFootballData and
#                              pollTeams crons. Set with
#                              `firebase functions:secrets:set FOOTBALL_DATA_TOKEN`.

name: Deploy to Firebase

on:
  push:
    branches: [main]
  # Lets you re-deploy manually from the Actions tab without pushing a commit.
  workflow_dispatch:

# Cancel in-progress deploys if a newer commit lands on main. Prevents two
# deploys racing each other and ending up in an inconsistent state.
concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Cache root npm; functions/ has its own lockfile and gets a
          # separate cache step below.
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache functions dependencies
        uses: actions/cache@v4
        with:
          path: functions/node_modules
          key: ${{ runner.os }}-functions-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-functions-

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Angular app
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      # Writes the JSON key to a temp file and exports
      # GOOGLE_APPLICATION_CREDENTIALS automatically. firebase-tools picks
      # this up without any extra flags.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GOALDEN_693DC }}

      - name: Deploy to Firebase
        run: |
          npx firebase-tools@latest deploy \
            --only hosting,functions,firestore:rules,firestore:indexes \
            --project goalden-693dc \
            --non-interactive
