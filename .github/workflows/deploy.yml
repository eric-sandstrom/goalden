# Deploys to Firebase: Hosting (Angular app) + Cloud Functions + Firestore
# rules + indexes.
#
# Triggers (changed from "every push to main"):
#   - workflow_call:     invoked by release-please.yml ONLY when a release PR
#                        merges (i.e. a new version is cut). Tying deploys to
#                        releases keeps the deployed build's version in step
#                        with CHANGELOG.md, so the in-app "What's new" dialog is
#                        always populated (one reload prompt per release, never
#                        an empty interim one).
#   - workflow_dispatch: manual deploy from the Actions tab — hotfixes,
#                        backend-only (functions/rules) changes you don't want
#                        to wait for a release, or a plain re-deploy.
#
# Ordinary merges to main no longer deploy. To ship: cut a release (merge the
# release PR), or run this workflow manually via workflow_dispatch.
#
# Authentication uses a Google Cloud service account. firebase-tools v15+
# dropped support for the old FIREBASE_TOKEN env var, so we now pass a
# service account JSON via google-github-actions/auth which writes it to a
# tempfile and exports GOOGLE_APPLICATION_CREDENTIALS — firebase-tools then
# picks it up automatically.
#
# Required GitHub secret:
#   FIREBASE_SERVICE_ACCOUNT_GOALDEN_693DC
#       The full JSON contents of a service account key with the
#       `Firebase Admin` role on the goalden-693dc project. This is the
#       secret name auto-generated by `firebase init hosting:github`; we
#       reuse it so there's only one set of CI credentials to rotate.
#
# Required Firebase Functions secret (set once locally, separate from GitHub):
#   FOOTBALL_DATA_TOKEN        Used by the deployed pollFootballData cron plus
#                              the activation-driven sync (setCompetitionActive,
#                              resyncCompetition) and scoreMatch. Set with
#                              `firebase functions:secrets:set FOOTBALL_DATA_TOKEN`.

name: Deploy to Firebase

on:
  # Called in-line by release-please.yml when a release PR merges. (We can't
  # trigger off the release tag: tags pushed by the default GITHUB_TOKEN don't
  # start workflows — a GitHub anti-recursion safeguard.)
  workflow_call:
  # Manual deploy from the Actions tab — hotfixes, backend-only changes, or a
  # plain re-deploy without cutting a release.
  workflow_dispatch:

# Cancel in-progress deploys if a newer commit lands on main. Prevents two
# deploys racing each other and ending up in an inconsistent state.
concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          # Cache root npm; functions/ has its own lockfile and gets a
          # separate cache step below.
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache functions dependencies
        uses: actions/cache@v5
        with:
          path: functions/node_modules
          key: ${{ runner.os }}-functions-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-functions-

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Angular app
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      # Writes the JSON key to a temp file and exports
      # GOOGLE_APPLICATION_CREDENTIALS automatically. firebase-tools picks
      # this up without any extra flags.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GOALDEN_693DC }}

      - name: Deploy to Firebase
        # --force auto-confirms deletion of Cloud Functions that no longer
        # exist in source. Without it, --non-interactive aborts the whole
        # deploy whenever a function is retired (rather than prompting), e.g.
        # pollTeams / pollStandings removed in #46. Function exports are
        # PR-reviewed and deploys only run on release/dispatch, so letting CI
        # reconcile deletions is the intended source-of-truth behaviour.
        run: |
          npx firebase-tools@latest deploy \
            --only hosting,functions,firestore:rules,firestore:indexes \
            --project goalden-693dc \
            --non-interactive \
            --force
